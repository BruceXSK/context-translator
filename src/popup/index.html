<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Context Translator</title>
    <style>
      :root{--paper:#fbf8f1;--paper-2:#f3ecdd;--ink:#2b2620;--ink-soft:#6f6557;--accent:#9a6a2f;--rule:#e8ddc7;
        --serif:'Iowan Old Style','Palatino Linotype',Palatino,'Hoefler Text',Georgia,serif;
        --sans:'Avenir Next','Avenir','Segoe UI',system-ui,sans-serif;}
      *{box-sizing:border-box}
      body{margin:0;padding:0 0 16px;background:var(--paper);color:var(--ink);font-family:var(--sans);width:330px}
      header{padding:13px 16px 11px;background:var(--paper-2);border-bottom:1px solid var(--rule)}
      h1{margin:0;font-family:var(--serif);font-size:1.08rem;font-weight:600}
      h1::before{content:"";display:inline-block;width:3px;height:14px;background:var(--accent);margin-right:9px;vertical-align:-2px;border-radius:2px}
      form{padding:15px 16px 0;display:flex;flex-direction:column;gap:11px}
      label{display:flex;flex-direction:column;gap:4px;font-size:.7rem;letter-spacing:.05em;color:var(--ink-soft);text-transform:uppercase;font-weight:600}
      select{font-family:var(--sans);font-size:.85rem;color:var(--ink);padding:7px 9px;border:1px solid var(--rule);border-radius:6px;background:#fff;outline:none}
      select:focus{border-color:var(--accent)}
      .actions{display:flex;align-items:center;gap:12px;margin-top:3px}
      button{font-family:var(--sans);font-size:.82rem;font-weight:600;color:#fff;background:var(--accent);border:none;border-radius:6px;padding:8px 18px;cursor:pointer}
      button:hover{filter:brightness(1.06)}
      button.ghost{background:transparent;color:var(--accent);border:1px solid var(--rule);padding:8px 14px}
      button.ghost:hover{background:var(--paper-2);filter:none}
      #status{font-size:.75rem;color:var(--accent);min-height:1em}
      .hint{font-size:.68rem;color:var(--ink-soft);text-transform:none;letter-spacing:0;font-weight:400;margin-top:-3px}
      .page-info{padding:12px 16px 4px;border-top:1px solid var(--rule);margin-top:12px}
      .page-info h2{margin:0 0 9px;font-family:var(--sans);font-size:.66rem;letter-spacing:.08em;color:var(--ink-soft);text-transform:uppercase;font-weight:600}
      .pi-row{display:flex;align-items:center;gap:9px;margin-bottom:7px;font-size:.78rem}
      .pi-row.ctx{gap:8px}
      .pi-row:not(.ctx){justify-content:space-between}
      .pi-label{color:var(--ink-soft);font-weight:600;letter-spacing:.02em}
      .pi-row.ctx .pi-label{width:46px;flex:0 0 auto}
      .bar{flex:1 1 auto;height:8px;border-radius:999px;background:var(--rule);overflow:hidden}
      .bar-fill{height:100%;width:0;background:var(--ink-soft);border-radius:999px;transition:width .2s}
      .pi-val{flex:0 0 auto;color:var(--ink);font-variant-numeric:tabular-nums;font-weight:600;white-space:nowrap}
    </style>
  </head>
  <body>
    <header><h1>Context Translator</h1></header>
    <form id="settings">
      <label>目标语言
        <select name="targetLang">
          <option value="zh-CN">简体中文</option>
          <option value="zh-TW">繁體中文</option>
          <option value="en">English</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
          <option value="es">Español</option>
          <option value="ru">Русский</option>
        </select>
      </label>
      <div class="actions">
        <button type="submit">保存</button>
        <button type="button" id="openOptions" class="ghost">设置…</button>
        <span id="status"></span>
      </div>
    </form>
    <section class="page-info">
      <h2>当前页</h2>
      <div class="pi-row ctx">
        <span class="pi-label">Context</span>
        <div class="bar"><div id="ctxFill" class="bar-fill"></div></div>
        <span id="ctxText" class="pi-val">—</span>
      </div>
      <div class="pi-row">
        <span class="pi-label">Last Cache Hit Rate</span>
        <span id="lastRate" class="pi-val">—</span>
      </div>
      <div class="pi-row">
        <span class="pi-label">Total Cache Hit Rate</span>
        <span id="totalRate" class="pi-val">—</span>
      </div>
    </section>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
