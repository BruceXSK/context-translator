<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Context Translator · 设置</title>
    <style>
      :root{--paper:#fbf8f1;--paper-2:#f3ecdd;--ink:#2b2620;--ink-soft:#6f6557;--accent:#9a6a2f;--rule:#e8ddc7;
        --serif:'Iowan Old Style','Palatino Linotype',Palatino,'Hoefler Text',Georgia,serif;
        --sans:'Avenir Next','Avenir','Segoe UI',system-ui,sans-serif;}
      *{box-sizing:border-box}
      body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);
        min-height:100vh;padding:0 20px 48px;display:flex;flex-direction:column;align-items:center}
      header{width:100%;max-width:680px;padding:26px 0 16px;border-bottom:1px solid var(--rule);margin-bottom:8px}
      h1{margin:0;font-family:var(--serif);font-size:1.4rem;font-weight:600}
      h1::before{content:"";display:inline-block;width:4px;height:18px;background:var(--accent);margin-right:10px;vertical-align:-3px;border-radius:2px}
      form{width:100%;max-width:680px;display:flex;flex-direction:column;gap:16px;margin-top:8px}
      label{display:flex;flex-direction:column;gap:5px;font-size:.72rem;letter-spacing:.05em;color:var(--ink-soft);text-transform:uppercase;font-weight:600}
      input,textarea{font-family:var(--sans);font-size:.92rem;color:var(--ink);padding:9px 11px;border:1px solid var(--rule);border-radius:7px;background:#fff;outline:none}
      input:focus,textarea:focus{border-color:var(--accent)}
      textarea{resize:vertical;min-height:160px}
      .actions{display:flex;align-items:center;gap:14px;margin-top:4px}
      button{font-family:var(--sans);font-size:.88rem;font-weight:600;color:#fff;background:var(--accent);border:none;border-radius:7px;padding:9px 22px;cursor:pointer}
      button:hover{filter:brightness(1.06)}
      #status{font-size:.8rem;color:var(--accent);min-height:1em}
      .hint{font-size:.74rem;color:var(--ink-soft);text-transform:none;letter-spacing:0;font-weight:400}
      fieldset{border:none;padding:0;margin:0}
      legend{font-size:.72rem;letter-spacing:.05em;color:var(--ink-soft);text-transform:uppercase;font-weight:600;margin-bottom:7px}
      .segmented{display:inline-flex;border:1px solid var(--rule);border-radius:8px;overflow:hidden;background:#fff}
      .segmented label.seg{position:relative;flex:1 1 auto;display:flex;align-items:center;justify-content:center;padding:9px 26px;cursor:pointer;font-size:.88rem;font-weight:600;color:var(--ink);border-right:1px solid var(--rule);transition:background .15s,color .15s;user-select:none}
      .segmented label.seg:last-child{border-right:none}
      .segmented label.seg input{position:absolute;inset:0;opacity:0;margin:0;cursor:pointer}
      .segmented label.seg span{pointer-events:none}
      .segmented label.seg:hover{background:var(--paper-2)}
      .segmented label.seg:has(input:checked){background:var(--accent);color:#fff}
      .segmented label.seg:has(input:checked):hover{filter:brightness(1.06)}
      .switch{position:relative;display:inline-block;width:44px;height:24px}
      .switch input{position:absolute;inset:0;opacity:0;margin:0;cursor:pointer}
      .switch .track{position:absolute;inset:0;border-radius:999px;background:var(--rule);transition:background .15s}
      .switch .track::after{content:"";position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.2);transition:transform .15s}
      .switch input:checked + .track{background:var(--accent)}
      .switch input:checked + .track::after{transform:translateX(20px)}
      .switch input:focus-visible + .track{outline:2px solid var(--accent);outline-offset:2px}
      fieldset.effort[disabled] .seg{color:var(--ink-soft);cursor:not-allowed;background:#f3f3f3}
      fieldset.effort[disabled] .seg:hover{background:#f3f3f3;filter:none}
      fieldset.effort[disabled] .seg input{cursor:not-allowed}
      fieldset.effort[disabled] .seg:has(input:checked){background:var(--rule);color:var(--ink-soft)}
      fieldset.effort[disabled] .seg:has(input:checked):hover{background:var(--rule);filter:none}
      .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);max-width:540px;width:calc(100% - 40px);background:#fff;border:1px solid var(--rule);border-left:4px solid var(--accent);border-radius:8px;padding:14px 16px;box-shadow:0 8px 24px rgba(0,0,0,.14);font-size:.86rem;color:var(--ink);line-height:1.55;z-index:50;display:flex;gap:12px;align-items:flex-start}
      .toast[hidden]{display:none}
      .toast .toast-body{flex:1}
      .toast .toast-title{font-weight:600;color:var(--accent);margin-bottom:4px;font-size:.9rem}
      .toast .toast-text{color:var(--ink-soft);text-transform:none;letter-spacing:0;font-weight:400}
      .toast button.close{flex:0 0 auto;background:none;border:none;color:var(--ink-soft);font-size:1rem;line-height:1;cursor:pointer;padding:2px 4px;border-radius:4px}
      .toast button.close:hover{color:var(--ink);background:var(--paper-2)}
    </style>
  </head>
  <body>
    <header><h1>Context Translator 设置</h1></header>
    <form id="settings">
      <label>Base URL<input name="baseUrl" type="url" placeholder="https://api.deepseek.com" /></label>
      <label>API Key<input name="apiKey" type="password" placeholder="sk-..." /></label>
      <label>Model<input name="model" placeholder="deepseek-v4-flash" /></label>
      <label>最大上下文（K）<input name="maxContextK" type="number" min="1" step="1" inputmode="numeric" placeholder="1000" /><span class="hint">对应模型的上下文窗口，单位 K；默认 1000 = 1M（deepseek-v4-flash）。弹窗上下文用量仪表的分母。</span></label>
      <fieldset class="trigger">
        <legend>触发键</legend>
        <div class="segmented">
          <label class="seg"><input type="radio" name="triggerKey" value="Alt" checked /><span>ALT</span></label>
          <label class="seg"><input type="radio" name="triggerKey" value="Shift" /><span>SHIFT</span></label>
          <label class="seg"><input type="radio" name="triggerKey" value="Control" /><span>CTRL</span></label>
        </div>
      </fieldset>
      <fieldset class="thinking">
        <legend>思考模式</legend>
        <label class="switch"><input type="checkbox" name="thinking" /><span class="track"></span></label>
      </fieldset>
      <fieldset class="effort" disabled>
        <legend>思考强度</legend>
        <div class="segmented">
          <label class="seg"><input type="radio" name="effort" value="low" checked /><span>LOW</span></label>
          <label class="seg"><input type="radio" name="effort" value="medium" /><span>MEDIUM</span></label>
          <label class="seg"><input type="radio" name="effort" value="high" /><span>HIGH</span></label>
          <label class="seg"><input type="radio" name="effort" value="max" /><span>MAX</span></label>
        </div>
      </fieldset>
      <label>Custom Prompt<textarea name="customPrompt" rows="6" placeholder="可选。补充领域 / 术语 / 语气等指引；作为用户指引折入首条翻译，位于系统提示词之后、不可覆盖翻译规则。保存后需刷新已打开页面生效。"></textarea></label>
      <div class="actions"><button type="submit">保存</button><span id="status"></span></div>
      <p class="hint">目标语言在工具栏弹窗里切换。改动对整个浏览器生效：端点 / key / 模型 / 最大上下文 / 思考模式 / 思考强度即时生效；触发键与自定义提示词对新加载的页面生效（已打开页面需刷新）。</p>
    </form>
    <div id="toast" class="toast" hidden>
      <div class="toast-body">
        <div class="toast-title">思考模式已开启</div>
        <div class="toast-text">模型会先内部推理再翻译，因此等待首字期间会较长时间停留在「Translating…」——这是它在思考，属正常现象，并非卡住。思考会额外消耗 token（按输出计费）并让译文更慢到来。若偏好快速响应，推荐保持关闭。</div>
      </div>
      <button type="button" class="close" aria-label="关闭">✕</button>
    </div>
    <script type="module" src="./page.ts"></script>
  </body>
</html>
